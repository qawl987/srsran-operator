apiVersion: workload.nephio.org/v1alpha1
kind: SrsRANConfig
metadata:
  name: gnb-srsran-config
  namespace: example
spec:
  cucpImage: "docker.io/softwareradiosystems/srsran-project:latest"
  cuupImage: "docker.io/softwareradiosystems/srsran-project:latest"
  duImage: "docker.io/softwareradiosystems/srsran-project:latest"
  ueImage: "docker.io/softwareradiosystems/srsue:latest"
  radioBreakerImage: "docker.io/softwareradiosystems/radio-breaker:latest"
  zmqMode: true
  srate: "23.04"
  txGain: 75
  rxGain: 75
  ueCount: 1
  sliceIntent:
    type: eMBB
    fiveQI: 9
