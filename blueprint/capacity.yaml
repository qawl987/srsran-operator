apiVersion: req.nephio.org/v1alpha1
kind: Capacity
metadata:
  name: dataplane
  annotations:
    config.kubernetes.io/local-config: "true"
    # nfdeploy-fn reads this annotation to link the capacity request back to
    # the parent NFDeployment resource.
    specializer.nephio.org/owner: workload.nephio.org/v1alpha1.NFDeployment.gnb-example
    specializer.nephio.org/namespace: example
spec:
  # Informational hints to the Nephio scheduler for resource planning.
  # Actual resource requests/limits are managed by pod specs in the operator.
  maxUplinkThroughput: 20M
  maxDownlinkThroughput: 50M
