apiVersion: workload.nephio.org/v1alpha1
kind: SrsRANCellConfig
metadata:
  name: gnb-cell-config
  namespace: example
spec:
  dlArfcn: 368500
  band: 3
  channelBandwidthMHz: 10
  commonScs: 15
  pci: 1
  pdcch:
    ss0Index: 0
    coreset0Index: 6
    ss2Type: common
    dciFormat01and11: false
  prach:
    prachConfigIndex: 1
  pdschMcsTable: qam64
  puschMcsTable: qam64
  slicing:
    - sst: 1
      sd: 66051  # 0x010203 - eMBB slice
      schedCfg:
        minPrbPolicyRatio: 0
        maxPrbPolicyRatio: 50
        priority: 10
    - sst: 1
      sd: 1122867  # 0x112233 - URLLC slice
      schedCfg:
        minPrbPolicyRatio: 0
        maxPrbPolicyRatio: 100
        priority: 200
