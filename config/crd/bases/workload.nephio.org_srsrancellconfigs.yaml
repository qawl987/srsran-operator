---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: srsrancellconfigs.workload.nephio.org
spec:
  group: workload.nephio.org
  names:
    kind: SrsRANCellConfig
    listKind: SrsRANCellConfigList
    plural: srsrancellconfigs
    shortNames:
    - srscell
    singular: srsrancellconfig
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SrsRANCellConfig is the Schema for the radio cell configuration CRD.
          It carries the srsRAN cell_cfg parameters (band, frequency, PDCCH, PRACH, MCS).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SrsRANCellConfigSpec defines the radio cell parameters for srsRAN.
              Parameters match cell_cfg section of srsRAN gnb_zmq.yml / du_zmq.yml.
            properties:
              band:
                default: 3
                description: NR operating band number. e.g. 3 = FDD 1800 MHz.
                format: int32
                type: integer
              channelBandwidthMHz:
                default: 20
                description: Channel bandwidth in MHz.
                enum:
                - 5
                - 10
                - 15
                - 20
                - 25
                - 30
                - 40
                - 50
                - 60
                - 80
                - 90
                - 100
                format: int32
                type: integer
              commonScs:
                default: 15
                description: Subcarrier spacing in kHz (common_scs). 15 kHz SCS for
                  FR1.
                enum:
                - 15
                - 30
                format: int32
                type: integer
              dlArfcn:
                default: 368500
                description: Downlink ARFCN (center frequency). e.g. 368500 for Band
                  3 at 1800 MHz.
                format: int32
                type: integer
              pci:
                default: 1
                description: Physical Cell ID.
                format: int32
                type: integer
              pdcch:
                description: PDCCH configuration.
                properties:
                  coreset0Index:
                    default: 12
                    description: CORESET zero index. Matches pdcch.common.coreset0_index.
                    format: int32
                    type: integer
                  dciFormat01and11:
                    default: false
                    description: |-
                      Use DCI format 0_1/1_1 (true) vs 0_0/1_0 (false).
                      Matches pdcch.dedicated.dci_format_0_1_and_1_1.
                    type: boolean
                  ss0Index:
                    default: 0
                    description: Search space zero index (SS0). Matches pdcch.common.ss0_index
                      in srsRAN config.
                    format: int32
                    type: integer
                  ss2Type:
                    default: common
                    description: Search space 2 type. Matches pdcch.dedicated.ss2_type.
                    enum:
                    - common
                    - ue_specific
                    type: string
                type: object
              pdschMcsTable:
                default: qam64
                description: MCS table for PDSCH. "qam64" or "qam256".
                enum:
                - qam64
                - qam256
                type: string
              prach:
                description: PRACH configuration.
                properties:
                  prachConfigIndex:
                    default: 1
                    description: |-
                      PRACH configuration index per TS 38.211 Table 6.3.3.2-x.
                      Matches prach.prach_config_index in srsRAN config.
                    format: int32
                    type: integer
                type: object
              puschMcsTable:
                default: qam64
                description: MCS table for PUSCH. "qam64" or "qam256".
                enum:
                - qam64
                - qam256
                type: string
              slicing:
                description: Slicing configuration. Defines network slices and their
                  resource allocation.
                items:
                  description: SrsRANSliceConfig defines a network slice configuration.
                  properties:
                    schedCfg:
                      description: Scheduler configuration for this slice.
                      properties:
                        maxPrbPolicyRatio:
                          default: 100
                          description: Maximum PRB policy ratio (0-100). Caps resource
                            allocation.
                          format: int32
                          maximum: 100
                          minimum: 0
                          type: integer
                        minPrbPolicyRatio:
                          default: 0
                          description: Minimum PRB policy ratio (0-100). Guarantees
                            minimum resource allocation.
                          format: int32
                          maximum: 100
                          minimum: 0
                          type: integer
                        priority:
                          default: 10
                          description: Scheduler priority (0-255). Higher value =
                            higher priority.
                          format: int32
                          maximum: 255
                          minimum: 0
                          type: integer
                      required:
                      - maxPrbPolicyRatio
                      - minPrbPolicyRatio
                      - priority
                      type: object
                    sd:
                      description: Slice Differentiator (SD) in decimal. e.g. 66051
                        = 0x010203.
                      format: int32
                      maximum: 16777215
                      minimum: 0
                      type: integer
                    sst:
                      description: Slice/Service Type (SST). 1=eMBB, 2=URLLC, 3=MIoT.
                      format: int32
                      maximum: 255
                      minimum: 1
                      type: integer
                  required:
                  - sd
                  - sst
                  type: object
                type: array
            required:
            - band
            - channelBandwidthMHz
            - commonScs
            - dlArfcn
            - pci
            type: object
          status:
            description: SrsRANCellConfigStatus is the observed state of SrsRANCellConfig.
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
