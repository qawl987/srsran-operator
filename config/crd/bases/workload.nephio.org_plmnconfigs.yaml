---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: plmnconfigs.workload.nephio.org
spec:
  group: workload.nephio.org
  names:
    kind: PLMNConfig
    listKind: PLMNConfigList
    plural: plmnconfigs
    shortNames:
    - plmnconf
    singular: plmnconfig
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PLMNConfig is the Schema for the PLMN identity and slice configuration CRD.
          It carries PLMN, TAC, and the S-NSSAI slice list for the srsRAN gNB.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PLMNConfigSpec defines PLMN identity and slice support for the srsRAN gNB.
              Maps to cell_cfg.plmn, cell_cfg.tac, and the AMF supported_tracking_areas
              slice list in cu_cp.yml.
            properties:
              plmn:
                default: "20893"
                description: |-
                  PLMN as a 5-digit string (MCC+MNC concatenated).
                  e.g. "20893" → MCC 208, MNC 93 (private/test PLMN).
                  Must match the free5GC/OAI core PLMN configuration.
                type: string
              slices:
                description: |-
                  Slices is the list of S-NSSAI entries advertised by this gNB.
                  These populate cu_cp.amf.supported_tracking_areas[].plmn_list[].tai_slice_support_list.
                items:
                  description: SliceInfo represents a single S-NSSAI (Single Network
                    Slice Selection Assistance Information).
                  properties:
                    sd:
                      description: |-
                        SD is the Slice Differentiator (6 hex digits, e.g. "010203").
                        Empty string means wildcard (matches any SD).
                      type: string
                    sst:
                      description: |-
                        SST is the Slice/Service Type.
                        1=eMBB, 2=URLLC, 3=mMTC per 3GPP TS 23.501.
                      format: int32
                      maximum: 255
                      minimum: 1
                      type: integer
                  required:
                  - sst
                  type: object
                type: array
              tac:
                default: 1
                description: Tracking Area Code. Must match the 5G core (free5GC/OAI)
                  TAC config.
                format: int32
                type: integer
            required:
            - plmn
            - slices
            - tac
            type: object
          status:
            description: PLMNConfigStatus is the observed state of PLMNConfig.
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
